# Pages CMS configuration — https://pagescms.org/docs
# Defines the friendly admin panel fields. Editing in Pages CMS commits to
# content/site.json; the site reads that file at runtime (assets/js/content.js).
media:
  input: assets/images
  output: assets/images
content:
  - name: site
    label: Website-Inhalte
    type: file
    path: content/site.json
    format: json
    fields:
      - name: kontakt
        label: Kontaktdaten
        type: object
        fields:
          - { name: email, label: "E-Mail (Anzeige)", type: string }
          - { name: emailHref, label: "E-Mail-Link (mailto:…)", type: string }
          - { name: phone, label: "Telefon (Anzeige)", type: string }
          - { name: phoneHref, label: "Telefon-Link (tel:…)", type: string }
          - { name: whatsapp, label: "WhatsApp (Anzeige)", type: string }
          - { name: whatsappHref, label: "WhatsApp-Link (https://wa.me/…)", type: string }
          - { name: hours, label: "Erreichbar", type: string }
          - { name: response, label: "Antwortzeit", type: string }
      - name: budget
        label: "Budget-Stufen"
        type: string
        list: true
      - name: projekte
        label: Projekte
        type: object
        fields:
          - name: featured
            label: "Featured Cases (große Karten)"
            type: object
            list: true
            fields:
              - { name: name, label: Name, type: string }
              - { name: category, label: Kategorie, type: string }
              - { name: year, label: Jahr, type: string }
              - { name: url, label: "Website-Link (https://…)", type: string }
              - { name: image, label: Vorschaubild, type: image }
              - { name: description, label: Beschreibung, type: text }
          - name: index
            label: "Projekt-Liste (unten)"
            type: object
            list: true
            fields:
              - { name: name, label: Name, type: string }
              - { name: category, label: Kategorie, type: string }
              - { name: year, label: Jahr, type: string }
              - { name: url, label: "Website-Link (leer lassen = „In Vorbereitung“)", type: string }
      - name: team
        label: Team
        type: object
        list: true
        fields:
          - { name: name, label: Name, type: string }
          - { name: role, label: "Rolle / Position", type: string }
          - { name: photo, label: Foto, type: image }
          - { name: bio, label: "Bio (Absätze durch Leerzeile trennen)", type: text }
          - { name: skills, label: Skills / Tags, type: string, list: true }
      - name: partner
        label: Partner
        type: object
        list: true
        fields:
          - { name: category, label: "Kategorie (ohne „/“ davor)", type: string }
          - { name: name, label: Name, type: string }
          - { name: description, label: Beschreibung, type: text }
          - { name: url, label: "Website-Link (optional)", type: string }
      - name: start
        label: "Startseite"
        type: object
        fields:
          - name: hero
            label: "Hero (ganz oben)"
            type: object
            fields:
              - { name: lead, label: "Untertitel", type: text }
              - { name: leadAccent, label: "Pointe am Ende (fett)", type: string }
              - { name: cta, label: "Button-Text", type: string }
          - name: manifesto
            label: "Manifest"
            type: object
            fields:
              - { name: lead, label: "Absatz", type: text }
          - name: stats
            label: "Kennzahlen (Counter)"
            type: object
            list: true
            fields:
              - { name: num, label: "Zahl (nur Ziffern)", type: string }
              - { name: suffix, label: "Einheit (%, s …)", type: string }
              - { name: label, label: "Beschriftung", type: string }
          - name: services
            label: "Service-Karten"
            type: object
            list: true
            fields:
              - { name: title, label: "Titel", type: string }
              - { name: desc, label: "Beschreibung", type: text }
              - { name: items, label: "Stichpunkte", type: string, list: true }
          - { name: servicesMore, label: "Service-Karten: Link-Text", type: string }
          - name: process
            label: "Ablauf-Schritte"
            type: object
            list: true
            fields:
              - { name: label, label: "Label (oben, klein)", type: string }
              - { name: title, label: "Titel", type: string }
              - { name: desc, label: "Beschreibung", type: text }
              - { name: time, label: "Dauer", type: string }
          - name: contact
            label: "Kontakt-Bereich"
            type: object
            fields:
              - { name: lead, label: "Einleitung", type: text }
      - name: footer
        label: "Footer (alle Seiten)"
        type: object
        fields:
          - { name: studio, label: "Studio-Zeile 1", type: string }
          - { name: location, label: "Studio-Zeile 2 (Ort)", type: string }
          - { name: copyright, label: "Copyright-Zeile", type: string }
